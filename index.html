  <script>
    
document.addEventListener('DOMContentLoaded', async function() {
  const loading = document.getElementById('__bundler_loading');
  function setStatus(msg) { if (loading) loading.textContent = msg; }

  // Error sink persists across replaceWith since it's on window, not the DOM.
  window.addEventListener('error', function(e) {
    var p = document.body || document.documentElement;
    var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));
    d.id = '__bundler_err';
    d.style.cssText = 'position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto';
    d.textContent = (d.textContent ? d.textContent + String.fromCharCode(10) : '') +
      '[bundle] ' + (e.message || e.type) +
      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
  }, true);

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;
    }

    const manifest = JSON.parse(manifestEl.textContent);
    let template = JSON.parse(templateEl.textContent);

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    const blobUrls = {};
    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;
            }
            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }
          } else {
            console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');
          }
        }

        blobUrls[uuid] = URL.createObjectURL(new Blob([finalBytes], { type: entry.mime }));
      } catch (err) {
        console.error('Failed to decode asset ' + uuid + ':', err);
        blobUrls[uuid] = URL.createObjectURL(new Blob([], { type: entry.mime }));
      }
    }));

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];
    const resourceMap = {};
    for (const entry of extResources) {
      if (blobUrls[entry.uuid]) resourceMap[entry.id] = blobUrls[entry.uuid];
    }

    setStatus('Rendering...');
    for (const uuid of uuids) template = template.split(uuid).join(blobUrls[uuid]);

    // Strip integrity + crossorigin — blob URLs from a file:// document inherit
    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.
    template = template.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

    const resourceScript = '<script>window.__resources = ' +
      JSON.stringify(resourceMap).split('</' + 'script>').join('<\\/' + 'script>') +
      ';</' + 'script>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>
    // (synthesizing one if the source HTML omitted it) but may carry
    // attributes through, so match the full opening tag. slice() rather than
    // replace() keeps us clear of $-pattern substitution in resourceScript.
    const headOpen = template.match(/<head[^>]*>/i);
    if (headOpen) {
      const i = headOpen.index + headOpen[0].length;
      template = template.slice(0, i) + resourceScript + template.slice(i);
    }

    // Parse the template and swap the root element. Scripts inserted via
    // DOMParser/replaceWith are inert per spec — re-create each with
    // createElement so they execute, awaiting onload for src scripts to
    // preserve ordering (React before ReactDOM before Babel before text/babel).
    const doc = new DOMParser().parseFromString(template, 'text/html');
    document.documentElement.replaceWith(doc.documentElement);
    const dead = Array.from(document.scripts);
    for (const old of dead) {
      const s = document.createElement('script');
      for (const a of old.attributes) s.setAttribute(a.name, a.value);
      s.textContent = old.textContent;
      // text/babel scripts with a src: fetch and inline. transformScriptTags
      // does XHR against the src, but blob:null/ from a file:// origin is
      // silently dropped. Inlining makes it a plain inline babel script,
      // which transformScriptTags handles unconditionally.
      if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
        const r = await fetch(s.src);
        s.textContent = await r.text();
        s.removeAttribute('src');
      }
      const p = s.src ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
      old.replaceWith(s);
      if (p) await p;
    }
    // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
    // which fired before we swapped the document. Trigger manually if present.
    if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
      window.Babel.transformScriptTags();
    }
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }
});

=\"line-height:1.2;\">\n            <div style=\"font-size:12.5px;font-weight:700;color:#141A22;letter-spacing:-.1px;\">Credion MB<\u002Fdiv>\n            <div style=\"font-size:10px;color:#9AA3B2;letter-spacing:.3px;\">Amsterdam &amp; Texel · Financieringsdesk<\u002Fdiv>\n          <\u002Fdiv>\n        <\u002Fdiv>\n        <div style=\"font-size:10px;font-weight:600;letter-spacing:1.6px;text-transform:uppercase;color:#0F63FD;background:#EEF3FF;padding:6px 12px;border-radius:99px;\">Rapportgenerator<\u002Fdiv>\n      <\u002Fdiv>\n\n      <sc-if value=\"{{ isUpload }}\" hint-placeholder-val=\"{{ true }}\">\n      <div style=\"padding:40px 40px 42px;\">\n        <div style=\"font-size:10.5px;font-weight:700;letter-spacing:2px;text-transform:uppercase;color:#0F63FD;display:inline-flex;align-items:center;gap:10px;margin-bottom:16px;\">\n          <span style=\"width:26px;height:1.5px;background:#0F63FD;display:inline-block;\"><\u002Fspan>Capsearch → Financieringsrapport\n        <\u002Fdiv>\n        <h1 style=\"font-family:'Instrument Serif',Georgia,serif;font-size:38px;line-height:1.1;font-weight:400;color:#072B6E;letter-spacing:-.5px;margin-bottom:16px;max-width:600px;\">Van Capsearch-memorandum naar professioneel financieringsrapport<\u002Fh1>\n        <p style=\"font-size:14.5px;color:#6B7482;line-height:1.7;max-width:620px;margin-bottom:32px;\">Upload het Capsearch-memorandum. De tool leest de structuur, financieringsgegevens, zekerheden en toelichtingen uit en zet deze om naar een strak rapport in Credion MB-stijl.<\u002Fp>\n\n        <div style=\"display:flex;align-items:center;gap:10px;margin-bottom:16px;\">\n          <span style=\"font-size:10.5px;font-weight:600;letter-spacing:1.6px;text-transform:uppercase;color:#9AA3B2;border-left:2px solid #0F63FD;padding-left:8px;white-space:nowrap;\">Bronbestand<\u002Fspan>\n          <span style=\"flex:1;height:1px;background:#E4E9F1;\"><\u002Fspan>\n        <\u002Fdiv>\n\n        <label data-drop=\"\" style=\"display:flex;flex-direction:column;align-items:center;justify-content:center;text-align:center;min-height:210px;border:1.5px dashed {{ dropBorder }};border-radius:18px;background:{{ dropBg }};padding:30px 24px;cursor:pointer;transition:all .2s;position:relative;\" ondragover=\"{{ onDragOver }}\" ondragleave=\"{{ onDragLeave }}\" ondrop=\"{{ onDropFile }}\">\n          <sc-if value=\"{{ hasFile }}\" hint-placeholder-val=\"{{ false }}\">\n            <div style=\"width:52px;height:52px;border-radius:14px;background:#E7F5EF;border:1px solid #C9E9DC;display:flex;align-items:center;justify-content:center;color:#0F7A5A;margin-bottom:14px;\">\n              <svg width=\"24\" height=\"24\" viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"2.2\"><path d=\"M20 6L9 17l-5-5\"><\u002Fpath><\u002Fsvg>\n            <\u002Fdiv>\n            <div style=\"font-size:15px;font-weight:600;color:#141A22;margin-bottom:4px;\">{{ fileName }}<\u002Fdiv>\n            <div style=\"font-size:12px;color:#6B7482;\">{{ fileSize }} · Klaar om te verwerken<\u002Fdiv>\n            <div style=\"margin-top:14px;font-size:11.5px;color:#0F63FD;font-weight:600;\">Ander bestand kiezen<\u002Fdiv>\n          <\u002Fsc-if>\n          <sc-if value=\"{{ noFile }}\" hint-placeholder-val=\"{{ true }}\">\n            <div style=\"width:56px;height:56px;border-radius:15px;background:#fff;border:1px solid #E4E9F1;display:flex;align-items:center;justify-content:center;color:#0F63FD;margin-bottom:15px;box-shadow:0 3px 10px rgba(10,42,120,.06);\">\n              <svg width=\"26\" height=\"26\" viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"2\"><path d=\"M12 16V4M12 4l-4 4M12 4l4 4\"><\u002Fpath><path d=\"M4 16v2a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2v-2\"><\u002Fpath><\u002Fsvg>\n            <\u002Fdiv>\n            <div style=\"font-size:16px;font-weight:600;color:#141A22;margin-bottom:5px;\">Voeg Capsearch memorandum toe<\u002Fdiv>\n            <div style=\"font-size:12.5px;color:# 2Fh2><div style=\"font-size:12.5px;color:#6B7482;margin-top:3px;\">Kernpunten van de financieringsaanvraag in één oogopslag.<\u002Fdiv><\u002Fdiv>\n  <\u002Fdiv>\n\n  <div style=\"display:grid;grid-template-columns:repeat(4,1fr);gap:12px;margin-bottom:26px;\">\n    <div style=\"border:1px solid #E4E9F1;border-radius:13px;padding:15px 16px;background:#FAFCFF;\"><div style=\"font-size:9.5px;font-weight:600;letter-spacing:1.1px;text-transform:uppercase;color:#9AA3B2;margin-bottom:7px;\">Kredietnemer<\u002Fdiv><div style=\"font-size:14px;font-weight:600;color:#141A22;line-height:1.25;\">Hogenhout Transport Groep B.V.<\u002Fdiv><\u002Fdiv>\n    <div style=\"border:1px solid #E4E9F1;border-radius:13px;padding:15px 16px;background:#FAFCFF;\"><div style=\"font-size:9.5px;font-weight:600;letter-spacing:1.1px;text-transform:uppercase;color:#9AA3B2;margin-bottom:7px;\">Financieringsbehoefte<\u002Fdiv><div style=\"font-size:22px;font-weight:700;color:#0F63FD;letter-spacing:-.5px;\">€ 75.400<\u002Fdiv><\u002Fdiv>\n    <div style=\"border:1px solid #E4E9F1;border-radius:13px;padding:15px 16px;background:#FAFCFF;\"><div style=\"font-size:9.5px;font-weight:600;letter-spacing:1.1px;text-transform:uppercase;color:#9AA3B2;margin-bottom:7px;\">Financieringsvorm<\u002Fdiv><div style=\"font-size:14px;font-weight:600;color:#141A22;\">Financial lease<\u002Fdiv><div style=\"font-size:11px;color:#6B7482;margin-top:2px;\">60 mnd · 7,5% rekenrente<\u002Fdiv><\u002Fdiv>\n    <div style=\"border:1px solid #E4E9F1;border-radius:13px;padding:15px 16px;background:#FAFCFF;\"><div style=\"font-size:9.5px;font-weight:600;letter-spacing:1.1px;text-transform:uppercase;color:#9AA3B2;margin-bottom:7px;\">Zekerheden<\u002Fdiv><div style=\"font-size:14px;font-weight:600;color:#141A22;line-height:1.25;\">Verpanding bedrijfsmiddelen<\u002Fdiv><\u002Fdiv>\n  <\u002Fdiv>\n\n  <div style=\"display:grid;grid-template-columns:1fr 1fr;gap:24px;margin-bottom:24px;\">\n    <div>\n      <div style=\"font-size:10.5px;font-weight:600;letter-spacing:1.4px;text-transform:uppercase;color:#0F63FD;border-left:2px solid #0F63FD;padding-left:8px;margin-bottom:11px;\">Financieringsdoel<\u002Fdiv>\n      <p style=\"font-size:12.5px;color:#3C4553;line-height:1.65;\">De aanvraag ziet op een investering van € 75.400 in bedrijfsmiddelen ten behoeve van de operationele bedrijfsvoering. De investering betreft een nieuwe afvulinstallatie en laadinfrastructuur, waarmee de operationele capaciteit wordt vergroot en tegelijk wordt ingespeeld op de verdere verduurzaming van het wagenpark.<\u002Fp>\n    <\u002Fdiv>\n    <div>\n      <div style=\"font-size:10.5px;font-weight:600;letter-spacing:1.4px;text-transform:uppercase;color:#0F63FD;border-left:2px solid #0F63FD;padding-left:8px;margin-bottom:11px;\">Belangrijkste zekerheden<\u002Fdiv>\n      <p style=\"font-size:12.5px;color:#3C4553;line-height:1.65;\">Als primaire zekerheid geldt de verpanding van de te financieren bedrijfsmiddelen. Daarnaast zijn er bestaande zekerheden uit hoofde van de lopende bedrijfspandfinanciering (hypotheekrecht en borgstelling). <span style=\"font-size:9.5px;font-weight:600;letter-spacing:.4px;text-transform:uppercase;color:#B45309;background:#FEF4E4;border:1px solid #F6E2BE;padding:2px 7px;border-radius:5px;white-space:nowrap;\">Nog te controleren<\u002Fspan><\u002Fp>\n    <\u002Fdiv>\n  <\u002Fdiv>\n\n  <div style=\"background:#EEF3FF;border:1px solid #D8E4FF;border-radius:14px;padding:20px 22px;\">\n    <div style=\"font-size:10.5px;font-weight:700;letter-spacing:1.4px;text-transform:uppercase;color:#0F63FD;margin-bottom:9px;\">Conclusie · financieringsrationale<\u002Fdiv>\n    <p style=\"font-size:13px;color:#243A63;line-height:1.65;\">De onderneming is gevestigd in de transportsector en heeft een aantoonbaar operationeel belang bij de voorgenomen investering. De financieringsbehoefte is beperkt van omvang ten opzichte van de bestaande balanspositie en wordt afgedekt met verpanding van de aan te schaffen bedrijfsmiddelen. De gevraagde financial lease sluit qua looptijd (60 maanden) aan bij de economische levensduur van de activa. Onder voorbehoud van een actuele bankopgave en bevestiging van de zekerheidspositie beoordelen wij de aanvraag als <strong>indicatief financierbaar<\u002Fstrong>.<\u002Fp>\n  <\u002Fdiv>\n\n  <div style=\"margin-top:auto;padding-top:20px;border-top:1px solid #E4E9F1;display:flex;align-items:center;justify-content:space-between;font-size:10px;color:#9AA3B2;letter-spacing:.3px;\">\n    <span>Credion MB Amsterdam &amp; Texel · Vertrouwelijk<\u002Fspan><span>Pagina 2 · 10<\u002Fspan>\n  <\u002Fdiv>\n<\u002Fdiv>\n\n<div data-a4=\"\" data-screen-label=\"02 Aanvrager en juridische structuur\" style=\"width:794px;min-height:1123px;background:#fff;box-shadow:0 10px 44px rgba(7,43,110,.10);padding:52px 56px 34px;display:flex;flex-direction:column;\">\n  <div style=\"display:flex;align-items:center;justify-content:space-between;padding-bottom:15px;border-bottom:1px solid #E4E9F1;margin-bottom:30px;\">\n    <div style=\"font-size:10px;font-weight:600;letter-spacing:1.3px;text-transform:uppercase;color:#9AA3B2;\">Financieringsmemorandum · Hogenhout Transport Groep B.V.<\u002Fdiv>\n    <img src=\"f201e5ad-3a08-4541-a6c5-d08ca65b6000\" alt=\"Credion\" style=\"height:15px;width:auto;display:block;opacity:.9;\">\n  <\u002Fdiv>\n\n  <div style=\"display:flex;align-items:flex-start;gap:15px;margin-bottom:26px;\">\n    <div style=\"flex-shrink:0;width:40px;height:40px;border-radius:11px;background:#EEF3FF;color:#0F63FD;display:flex;align-items:center;justify-content:center;font-size:15px;font-weight:700;\">02<\u002Fdiv>\n    <div><h2 style=\"font-family:'Instrument Serif',Georgia,serif;font-size:30px;font-weight:400;color:#072B6E;letter-spacing:-.4px;line-height:1.05;\">Aanvrager en juridische structuur<\u002Fh2><div style=\"font-size:12.5px;color:#6B7482;margin-top:3px;\">Betrokken partijen, aandeelhouders en tekenbevoegdheid.<\u002Fdiv><\u002Fdiv>\n  <\u002Fdiv>\n\n  <d r;border:1px solid #D8E4FF;background:#EEF3FF;border-radius:11px;padding:12px 14px;\"><div style=\"font-size:12.5px;font-weight:700;color:#072B6E;\">Dhr. J. Hogenhout<\u002Fdiv><div style=\"font-size:10.5px;color:#5B78A8;\">UBO · 100%<\u002Fdiv><\u002Fdiv>\n        <div style=\"width:2px;height:22px;background:#C6D2E4;\"><\u002Fdiv>\n        <div style=\"width:210px;text-align:center;border:1px solid #D8E4FF;background:#F6F9FE;border-radius:11px;padding:12px 14px;\"><div style=\"font-size:12.5px;font-weight:700;color:#072B6E;\">Hogenhout Holding B.V.<\u002Fdiv><div style=\"font-size:10.5px;color:#5B78A8;\">Houdster · 100%<\u002Fdiv><\u002Fdiv>\n        <div style=\"width:2px;height:22px;background:#C6D2E4;\"><\u002Fdiv>\n        <div style=\"width:230px;text-align:center;border:1.5px solid #0F63FD;background:#fff;border-radius:11px;padding:13px 14px;box-shadow:0 4px 14px rgba(15,99,253,.12);\"><div style=\"font-size:12.5px;font-weight:700;color:#0F63FD;\">Hogenhout Transport Groep B.V.<\u002Fdiv><div style=\"font-size:10.5px;color:#6B7482;\">Kredietnemer · werkmaatschappij<\u002Fdiv><\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n    <div>\n      <div style=\"font-size:10.5px;font-weight:600;letter-spacing:1.4px;text-transform:uppercase;color:#0F63FD;border-left:2px solid #0F63FD;padding-left:8px;margin-bottom:16px;\">Tekenbevoegde bestuurders<\u002Fdiv>\n      <div style=\"display:flex;flex-direction:column;gap:10px;margin-bottom:22px;\">\n        <div style=\"display:flex;align-items:center;gap:11px;border:1px solid #E4E9F1;border-radius:11px;padding:12px 14px;\"><div style=\"width:34px;height:34px;border-radius:50%;background:#EEF3FF;color:#0F63FD;display:flex;align-items:center;justify-content:center;font-weight:700;font-size:12px;\">JH<\u002Fdiv><div><div style=\"font-size:12.5px;font-weight:600;color:#141A22;\">Dhr. J. Hogenhout<\u002Fdiv><div style=\"font-size:11px;color:#6B7482;\">Zelfstandig bevoegd bestuurder<\u002Fdiv><\u002Fdiv><\u002Fdiv>\n        <div style=\"display:flex;align-items:center;gap:11px;border:1px solid #E4E9F1;border-radius:11px;padding:12px 14px;\"><div style=\"width:34px;height:34px;border-radius:50%;background:#F3F6FC;color:#6B7482;display:flex;align-items:center;justify-content:center;font-weight:700;font-size:12px;\">—<\u002Fdiv><div><div style=\"font-size:12.5px;font-weight:600;color:#141A22;\">Tweede bestuurder<\u002Fdiv><div style=\"font-size:11px;color:#9AA3B2;font-style:italic;\">Niet opgenomen in bron<\u002Fdiv><\u002Fdiv><\u002Fdiv>\n      <\u002Fdiv>\n      <div style=\"display:flex;gap:11px;background:#FEF4E4;border:1px solid #F6E2BE;border-left:3px solid #E0982A;border-radius:12px;padding:13px 15px;\">\n        <svg width=\"16\" height=\"16\" viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"#B45309\" stroke-width=\"2.2\" style=\"flex-shrink:0;margin-top:1px;\"><path d=\"M12 9v4M12 17h.01M10.3 3.9 1.8 18a2 2 0 0 0 1.7 3h17a2 2 0 0 0 1.7-3L13.7 3.9a2 2 0 0 0-3.4 0z\"><\u002Fpath><\u002Fsvg>\n        <div style=\"font-size:11.5px;color:#7A5310;line-height:1.55;\"><strong style=\"color:#B45309;\">Aandachtspunt.<\u002Fstrong> Aandeelhoudersverhoudingen en tekenbevoegdheid dienen te worden bevestigd aan de hand van een actueel KvK-uittreksel.<\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fdiv>\n\n  <div style=\"margin-top:auto;padding-top:20px;border-top:1px solid #E4E9F1;display:flex;align-items:center;justify-content:space-between;font-size:10px;color:#9AA3B2;letter-spacing:.3px;\">\n    <span>Credion MB Amsterdam &amp; Texel · Vertrouwelijk<\u002Fspan><span>Pagina 3 · 10<\u002Fspan>\n  <\u002Fdiv>\n<\u002Fdiv>\n<div data-a4=\"\" data-screen-label=\"03 Activiteiten onderneming\" style=\"width:794px;min-height:1123px;background:#fff;box-shadow:0 10px 44px rgba(7,43,110,.10);padding:52px 56px 34px;display:flex;flex-direction:column;\">\n  <div style=\"display:flex;align-items:center;justify-content:space-between;padding-bottom:15px;border-bottom:1px solid #E4E9F1;margin-bottom:30px;\">\n    <div style=\"font-size:10px;font-weight:600;letter-spacing:1.3px;text-transform:uppercase;color:#9AA3B2;\">Financieringsmemorandum · Hogenhout Transport Groep B.V.<\u002Fdiv>\n    <img src=\"f201e5ad-3a08-4541-a6c5-d08ca65b6000\" alt=\"Credion\" style=\"height:15px;width:auto;display:block;opacity:.9;\">\n  <\u002Fdiv>\n  <div style=\"display:flex;align-items:flex-start;gap:15px;margin-bottom:26px;\">\n    <div style=\"flex-shrink:0;width:40px;height:40px;border-radius:11px;background:#EEF3FF;color:#0F63FD;display:flex;align-items:center;justify-content:center;font-size:15px;font-weight:700;\">03<\u002Fdiv>\n    <div><h2 style=\"font-family:'Instrument Serif',Georgia,serif;font-size:30px;font-weight:400;color:#072B6E;letter-spacing:-.4px;line-height:1.05;\">Activiteiten onderneming<\u002Fh2><div style=\"font-size:12.5px;color:#6B7482;margin-top:3px;\">Aard van de onderneming, marktpositie en klantrelaties.<\u002Fdiv><\u002Fdiv>\n  <\u002Fdiv>\n\n  <p style=\"font-size:12.5px;color:#3C4553;line-height:1.7;margin-bottom:24px;\">Hogenhout Transport Groep B.V. is actief als transport- en logistiekonderneming. De onderneming verzorgt vervoer en aanverwante logistieke dienstverlening voor een gevarieerd klantenbestand. De bedrijfsvoering steunt op een eigen wagenpark en operationele faciliteiten; de voorgenomen investering versterkt deze operationele capaciteit.<\u002Fp>\n\n  <div style=\"font-size:10.5px;font-weight:600;letter-spacing:1.4px;text-transform:uppercase;color:#0F63FD;border-left:2px solid #0F63FD;padding-left:8px;margin-bottom:14px;\">Bedrijfsactiviteiten &amp; omzetgroepen<\u002Fdiv>\n  <div style=\"display:flex;flex-direction:column;gap:9px;margin-bottom:26px;\">\n    <div style=\"display:flex;align-items:center;gap:14px;\"><span style=\"width:150px;font-size:12px;font-weight:600;color:#141A22;\">Transport &amp; distributie<\u002Fspan><span style=\"flex:1;height:9px;border-radius:99px;background:#EEF3FF;overflow:hidden;\"><span style=\"display:block;height:100%;width:64%;background:#0F63FD;border-radius:99px;\"><\u002Fspan><\u002Fspan><span style=\"width:42px;text-align:right;font-size:11.5px;font-weight:600;color:#0F63FD;\">± 64%<\u002Fspan><\u002Fdiv>\n    <div style=\"display:flex;align-items:center;gap:14px;\"><span style=\"width:150px;font-size:12px;font-weight:600;color:#141A22;\">Logistieke diensten<\u002Fspan><span style=\"flex:1;height:9px;border-radius:99px;background:#EEF3FF;overflow:hidden;\"><span style=\"display:block;height:100%;width:26%;background:#3D86FF;border-radius:99px;\"><\u002Fspan><\u002Fspan><span style=\"width:42px;text-align:right;font-size:11.5px;font-weight:600;color:#0F63FD;\">± 26%<\u002Fspan><\u002Fdiv>\n    <div style=\"display:flex;align-items:center;gap:14px;\"><span style=\"width:150px;font-size:12px;font-weight:600;color:#141A22;\">Overig / aanvullend<\u002Fspan><span style=\"flex:1;height:9px;border-radius:99px;background:#EEF3FF;overflow:hidden;\"><span style=\"display:block;height:100%;width:10%;background:#8FB6FF;border-radius:99px;\"><\u002Fspan><\u002Fspan><span style=\"width:42px;text-align:right;font-size:11.5px;font-weight:600;color:#0F63FD;\">± 10%<\u002Fspan><\u002Fdiv>\n    <div style=\"font-size:10.5px;color:#9AA3B2;font-style:italic;margin-top:2px;\">Verdeling indicatief — niet nader gespecificeerd in bron. <span style=\"font-weight:600;color:#B45309;font-style:normal;\">Aanvullen door adviseur.<\u002Fspan><\u002Fdiv>\n  <\u002Fdiv>\n\n  <div style=\"display:grid;grid-template-columns:1fr 1fr 1fr;gap:12px;margin-bottom:24px;\">\n    <div style=\"border:1px solid #E4E9F1;border-radius:13px;padding:16px 17px;background:#FAFCFF;\"><div style=\"font-size:10.5px;font-weight:700;color:#0F63FD;margin-bottom:7px;\">Marktpositie<\u002Fdiv><div style=\"font-size:11.5px;color:#3C4553;line-height:1.6;\">Gevestigde speler in de regionale transportmarkt met een bestendige klantenkring en herhalende opdrachten.<\u002Fdiv><\u002Fdiv>\n    <div style=\"border:1px solid #E4E9F1;border-radius:13px;padding:16px 17px;background:#FAFCFF;\"><div style=\"font-size:10.5px;font-weight:700;color:#0F63FD;margin-bottom:7px;\">Toegevoegde waarde<\u002Fdiv><div style=\"font-size:11.5px;color:#3C4553;line-height:1.6;\">Combinatie van transport en logistieke afhandeling; investering vergroot capaciteit en verduurzaamt het wagenpark.<\u002Fdiv><\u002Fdiv>\n    <div style=\"border:1px solid #E4E9F1;border-radius:13px;padding:16px 17px;background:#FAFCFF;\"><div style=\"font-size:10.5px;font-weight:700;color:#0F63FD;margin-bottom:7px;\">Klantrelaties<\u002Fdiv><div style=\"font-size:11.5px;color:#3C4553;line-height:1.6;\">Langlopende relaties met zakelijke afnemers. Concentratie per afnemer niet gespecificeerd in bron.<\u002Fdiv><\u002Fdiv>\n  <\u002Fdiv>\n\n  <div style=\"display:flex;gap:11px;background:#FEF4E4;border:1px solid #F6E2BE;border-left:3px solid #E0982A;border-radius:12px;padding:13px 15px;\">\n    <svg width=\"16\" height=\"16\" viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"#B45309\" stroke-width=\"2.2\" style=\"flex-shrink:0;margin-top:1px;\"><path d=\"M12 9v4M12 17h.01M10.3 3.9 1.8 18a2 2 0 0 0 1.7 3h17a2 2 0 0 0 1.7-3L13.7 3.9a2 2 0 0 0-3.4 0z\"><\u002Fpath><\u002Fsvg>\n    <div style=\"font-size:11.5px;color:#7A5310;line-height:1.55;\"><strong style=\"color:#B45309;\">Aandachtspunt.<\u002Fstrong> Omzetverdeling en afnemersconcentratie zijn niet expliciet in het memorandum opgenomen. Onderbouwing met de meest recente jaarcijfers wordt aanbevolen.<\u002Fdiv>\n  <\u002Fdiv>\n\n  <div style=\"margin-top:auto;padding-top:20px;border-top:1px solid #E4E9F1;display:flex;align-items:center;justify-content:space-between;font-size:10px;color:#9AA3B2;letter-spacing:.3px;\">\n    <span>Credion MB Amsterdam &amp; Texel · Vertrouwelijk<\u002Fspan><span>Pagina 4 · 10<\u002Fspan>\n  <\u002Fdiv>\n<\u002Fdiv>\n\n<div data-a4=\"\" data-screen-label=\"04 Financieringsbehoefte\" style=\"width:794px;min-height:1123px;background:#fff;box-shadow:0 10px 44px rgba(7,43,110,.10);padding:52px 56px 34px;display:flex;flex-direction:column;\">\n  <div style=\"display:flex;align-items:center;justify-content:space-between;padding-bottom:15px;border-bottom:1px solid #E4E9F1;margin-bottom:30px;\">\n    <div style=\"font-size:10px;font-weight:600;letter-spacing:1.3px;text-transform:uppercase;color:#9AA3B2;\">Financieringsmemorandum · Hogenhout Transport Groep B.V.<\u002Fdiv>\n    <img src=\"f201e5ad-3a08-4541-a6c5-d08ca65b6000\" alt=\"Credion\" style=\"height:15px;width:auto;display:block;opacity:.9;\">\n  <\u002Fdiv>\n  <div style=\"display:flex;align-items:flex-start;gap:15px;margin-bottom:26px;\">\n    <div style=\"flex-shrink:0;width:40px;height:40px;border-radius:11px;background:#EEF3FF;color:#0F63FD;display:flex;align-items:center;justify-content:center;font-size:15px;font-weight:700;\">04<\u002Fdiv>\n    <div><h2 style=\"font-family:'Instrument Serif',Georgia,serif;font-size:30px;font-weight:400;color:#072B6E;letter-spacing:-.4px;line-height:1.05;\">Financieringsbehoefte<\u002Fh2><div style=\"font-size:12.5px;color:#6B7482;margin-top:3px;\">Omvang, specificatie en onderbouwing van de investering.<\u002Fdiv><\u002Fdiv>\n  <\u002Fdiv>\n\n  <div style=\"display:flex;align-items:stretch;gap:14px;margin-bottom:26px;\">\n    <div style=\"flex:0 0 210px;background:linear-gradient(155deg,#0A48B8,#072B6E);border-radius:15px;padding:22px 24px;color:#fff;display:flex;flex-direction:column;justify-content:center;\">\n      <div style=\"font-size:10px;font-weight:600;letter-spacing:1.4px;text-transform:uppercase;color:rgba(255,255,255,.6);margin-bottom:8px;\">Totale behoefte<\u002Fdiv>\n      <div style=\"font-size:38px;font-weight:700;letter-spacing:-1px;line-height:1;\">€ 75.400<\u002Fdiv>\n      <div style=\"font-size:11.5px;color:rgba(255,255,255,.72);margin-top:8px;\">Investering in bedrijfsmiddelen<\u002Fdiv>\n    <\u002Fdiv>\n    <div style=\"flex:1;border:1px solid #E4E9F1;border-radius:15px;overflow:hidden;\">\n      <div style=\"display:grid;grid-template-columns:1fr auto;background:#F3F6FC;padding:11px 20px;font-size:9.5px;font-weight:700;letter-spacing:1px;text-transform:uppercase;color:#6B7482;\"><span>Specificatie van de investering<\u002Fspan><span>Bedrag<\u002Fspan><\u002Fdiv>\n      <div style=\"display:grid;grid-template-columns:1fr auto;padding:14px 20px;border-top:1px solid #EEF2F8;align-items:center;\"><div><div style=\"font-size:12.5px;font-weight:600;color:#141A22;\">Afvulinstallatie<\u002Fdiv><div style=\"font-size:11px;color:#6B7482;\">Nieuwe productie-/afvulcapaciteit<\u002Fdiv><\u002Fdiv><span style=\"font-size:14px;font-weight:600;color:#141A22;\">€ 53.950<\u002Fspan><\u002Fdiv>\n      <div style=\"display:grid;grid-template-columns:1fr auto;padding:14px 20px;border-top:1px solid #EEF2F8;align-items:center;background:#FAFCFF;\"><div><div style=\"font-size:12.5px;font-weight:600;color:#141A22;\">Floading laadinfrastructuur<\u002Fdiv><div style=\"font-size:11px;color:#6B7482;\">Laadvoorziening t.b.v. wagenpark<\u002Fdiv><\u002Fdiv><span style=\"font-size:14px;font-weight:600;color:#141A22;\">€ 21.450<\u002Fspan><\u002Fdiv>\n      <div style=\"display:grid;grid-template-columns:1fr auto;padding:14px 20px;border-top:2px solid #D8E4FF;align-items:center;background:#EEF3FF;\"><span style=\"font-size:12.5px;font-weight:700;color:#072B6E;\">Totale financieringsbehoefte<\u002Fspan><span style=\"font-size:16px;font-weight:700;color:#0F63FD;\">€ 75.400<\u002Fspan><\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fdiv>\n\n  <div style=\"display:grid;grid-template-columns:1fr 1fr;gap:24px;margin-bottom:24px;\">\n    <div>\n      <div style=\"font-size:10.5px;font-weight:600;letter-spacing:1.4px;text-transform:uppercase;color:#0F63FD;border-left:2px solid #0F63FD;padding-left:8px;margin-bottom:11px;\">Onderbouwing van de behoefte<\u002Fdiv>\n      <p style=\"font-size:12.5px;color:#3C4553;line-height:1.7;\">De investering is noodzakelijk om de operationele capaciteit uit te breiden en de continuïteit van de dienstverlening te borgen. Met de nieuwe afvulinstallatie wordt de doorlooptijd verkort en de verwerkingscapaciteit vergroot; de laadinfrastructuur ondersteunt de verduurzaming en elektrificatie van het wagenpark.<\u002Fp>\n    <\u002Fdiv>\n    <div>\n      <div style=\"font-size:10.5px;font-weight:600;letter-spacing:1.4px;text-transform:uppercase;color:#0F63FD;border-left:2px solid #0F63FD;padding-left:8px;margin-bottom:11px;\">Verwacht effect op bedrijfsvoering<\u002Fdiv>\n      <p style=\"font-size:12.5px;color:#3C4553;line-height:1.7;\">De investering draagt bij aan een hogere operationele efficiëntie en lagere variabele kosten op termijn. Doordat de activa direct in het operationele proces worden ingezet, wordt een positief effect op de marge en de leaselasten-dekking verwacht.<\u002Fp>\n    <\u002Fdiv>\n  <\u002Fdiv>\n\n  <div style=\"display:flex;gap:11px;background:#FEF4E4;border:1px solid #F6E2BE;border-left:3px solid #E0982A;border-radius:12px;padding:13px 15px;\">\n    <svg width=\"16\" height=\"16\" viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"#B45309\" stroke-width=\"2.2\" style=\"flex-shrink:0;margin-top:1px;\"><path d=\"M12 9v4M12 17h.01M10.3 3.9 1.8 18a2 2 0 0 0 1.7 3h17a2 2 0 0 0 1.7-3L13.7 3.9a2 2 0 0 0-3.4 0z\"><\u002Fpath><\u002Fsvg>\n    <div style=\"font-size:11.5px;color:#7A5310;line-height:1.55;\"><strong style=\"color:#B45309;\">Nog te controleren.<\u002Fstrong> Offertes en/of orderbevestigingen voor de afvulinstallatie en laadinfrastructuur dienen ter onderbouwing van de investeringsbedragen te worden bijgevoegd.<\u002Fdiv>\n  <\u002Fdiv>\n\n  <div style=\"margin-top:auto;padding-top:20px;border-top:1px solid #E4E9F1;display:flex;align-items:center;justify-content:space-between;font-size:10px;color:#9AA3B2;letter-spacing:.3px;\">\n    <span>Credion MB Amsterdam &amp; Texel · Vertrouwelijk<\u002Fspan><span>Pagina 5 · 10<\u002Fspan>\n  <\u002Fdiv>\n<\u002Fdiv>\n<div data-a4=\"\" data-screen-label=\"05 Bestaande financieringen\" style=\"width:794px;min-height:1123px;background:#fff;box-shadow:0 10px 44px rgba(7,43,110,.10);padding:52px 56px 34px;display:flex;flex-direction:column;\">\n  <div style=\"display:flex;align-items:center;justify-content:space-between;padding-bottom:15px;border-bottom:1px solid #E4E9F1;margin-bottom:30px;\">\n    <div style=\"font-size:10px;font-weight:600;letter-spacing:1.3px;text-transform:uppercase;color:#9AA3B2;\">Financieringsmemorandum · Hogenhout Transport Groep B.V.<\u002Fdiv>\n    <img src=\"f201e5ad-3a08-4541-a6c5-d08ca65b6000\" alt=\"Credion\" style=\"height:15px;width:auto;display:block;opacity:.9;\">\n  <\u002Fdiv>\n  <div style=\"display:flex;align-items:flex-start;gap:15px;margin-bottom:26px;\">\n    <div style=\"flex-shrink:0;width:40px;height:40px;border-radius:11px;background:#EEF3FF;color:#0F63FD;display:flex;align-items:center;justify-content:center;font-size:15px;font-weight:700;\">05<\u002Fdiv>\n    <div><h2 style=\"font-family:'Instrument Serif',Georgia,serif;font-size:30px;font-weight:400;color:#072B6E;letter-spacing:-.4px;line-height:1.05;\">Bestaande financieringen<\u002Fh2><div style=\"font-size:12.5px;color:#6B7482;margin-top:3px;\">Huisbankrelatie en lopende verplichtingen.<\u002Fdiv><\u002Fdiv>\n  <\u002Fdiv>\n\n  <div style=\"display:flex;align-items:center;gap:14px;border:1px solid #E4E9F1;border-radius:13px;padding:15px 18px;background:#FAFCFF;margin-bottom:22px;\">\n    <div style=\"width:40px;height:40px;border-radius:10px;background:#EEF3FF;color:#0F63FD;display:flex;align-items:center;justify-content:center;\"><svg width=\"20\" height=\"20\" viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"2\"><path d=\"M3 21h18M4 21V10l8-5 8 5v11M9 21v-6h6v6\"><\u002Fpath><\u002Fsvg><\u002Fdiv>\n    <div style=\"flex:1;\"><div style=\"font-size:9.5px;font-weight:600;letter-spacing:1.1px;text-transform:uppercase;color:#9AA3B2;\">Huisbank<\u002Fdiv><div style=\"font-size:15px;font-weight:700;color:#141A22;\">ABN AMRO Bank N.V.<\u002Fdiv><\u002Fdiv>\n    <span style=\"font-size:9.5px;font-weight:600;letter-spacing:.4px;text-transform:uppercase;color:#B45309;background:#FEF4E4;border:1px solid #F6E2BE;padding:4px 9px;border-radius:6px;\">Bedragen indicatief<\u002Fspan>\n  <\u002Fdiv>\n\n  <div style=\"border:1px solid #E4E9F1;border-radius:12px;overflow:hidden;margin-bottom:22px;\">\n    <div style=\"display:grid;grid-template-columns:1.5fr 1fr 0.8fr 0.8fr 0.9fr;background:#F3F6FC;padding:11px 18px;font-size:9px;font-weight:700;letter-spacing:.8px;text-transform:uppercase;color:#6B7482;\"><span>Financiering<\u002Fspan><span>Restschuld (ind.)<\u002Fspan><span>Rente<\u002Fspan><span>Looptijd<\u002Fspan><span>Aflossing<\u002Fspan><\u002Fdiv>\n    <div style=\"display:grid;grid-template-columns:1.5fr 1fr 0.8fr 0.8fr 0.9fr;padding:13px 18px;border-top:1px solid #EEF2F8;font-size:12px;color:#3C4553;align-items:center;\"><span style=\"font-weight:600;color:#141A22;\">Bedrijfspandfinanciering<\u002Fspan><span style=\"font-weight:600;\">± € 2.031.250<\u002Fspan><span style=\"color:#9AA3B2;font-style:italic;\">n.t.b.<\u002Fspan><span style=\"color:#9AA3B2;font-style:italic;\">n.t.b.<\u002Fspan><span style=\"color:#9AA3B2;font-style:italic;\">n.t.b.<\u002Fspan><\u002Fdiv>\n    <div style=\"display:grid;grid-template-columns:1.5fr 1fr 0.8fr 0.8fr 0.9fr;padding:13px 18px;border-top:1px solid #EEF2F8;font-size:12px;color:#3C4553;align-items:center;background:#FAFCFF;\"><span style=\"font-weight:600;color:#141A22;\">Rekening-courant / werkkapitaal<\u002Fspan><span style=\"color:#9AA3B2;font-style:italic;\">Niet in bron<\u002Fspan><span style=\"color:#9AA3B2;font-style:italic;\">—<\u002Fspan><span style=\"color:#9AA3B2;font-style:italic;\">—<\u002Fspan><span style=\"color:#9AA3B2;font-style:italic;\">—<\u002Fspan><\u002Fdiv>\n  <\u002Fdiv>\n\n  <p style=\"font-size:12.5px;color:#3C4553;line-height:1.7;margin-bottom:22px;\">De onderneming heeft een bestaande bedrijfspandfinanciering bij ABN AMRO Bank. Het restschuldbedrag is in het memorandum als indicatief opgenomen en bedraagt circa € 2.031.250. Rente, looptijd, aflossingsvorm en actuele restschuld zijn niet nader gespecificeerd en dienen te worden vastgesteld op basis van een actuele bankopgave.<\u002Fp>\n\n  <div style=\"display:flex;gap:11px;background:#FEF4E4;border:1px solid #F6E2BE;border-left:3px solid #E0982A;border-radius:12px;padding:13px 15px;\">\n    <svg width=\"16\" height=\"16\" viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"#B45309\" stroke-width=\"2.2\" style=\"flex-shrink:0;margin-top:1px;\"><path d=\"M12 9v4M12 17h.01M10.3 3.9 1.8 18a2 2 0 0 0 1.7 3h17a2 2 0 0 0 1.7-3L13.7 3.9a2 2 0 0 0-3.4 0z\"><\u002Fpath><\u002Fsvg>\n    <div style=\"font-size:11.5px;color:#7A5310;line-height:1.55;\"><strong style=\"color:#B45309;\">Afstemmen met actuele bankopgave.<\u002Fstrong> De genoemde restschuld is indicatief. Vóór verzending dient een actuele bankopgave te worden opgevraagd ter bevestiging van restschuld, rente, resterende looptijd en aflossingsverplichtingen.<\u002Fdiv>\n  <\u002Fdiv>\n\n  <div style=\"margin-top:auto;padding-top:20px;border-top:1px solid #E4E9F1;display:flex;align-items:center;justify-content:space-between;font-size:10px;color:#9AA3B2;letter-spacing:.3px;\">\n    <span>Credion MB Amsterdam &amp; Texel · Vertrouwelijk<\u002Fspan><span>Pagina 6 · 10<\u002Fspan>\n  <\u002Fdiv>\n<\u002Fdiv>\n\n<div data-a4=\"\" data-screen-label=\"06 Nieuwe financiering\" style=\"width:794px;min-height:1123px;background:#fff;box-shadow:0 10px 44px rgba(7,43,110,.10);padding:52px 56px 34px;display:flex;flex-direction:column;\">\n  <div style=\"display:flex;align-items:center;justify-content:space-between;padding-bottom:15px;border-bottom:1px solid #E4E9F1;margin-bottom:30px;\">\n    <div style=\"font-size:10px;font-weight:600;letter-spacing:1.3px;text-transform:uppercase;color:#9AA3B2;\">Financieringsmemorandum · Hogenhout Transport Groep B.V.<\u002Fdiv>\n    <img src=\"f201e5ad-3a08-4541-a6c5-d08ca65b6000 radius:12px;overflow:hidden;margin-bottom:24px;\">\n    <div style=\"display:grid;grid-template-columns:1.5fr 1fr 1fr 1fr;background:#F3F6FC;padding:11px 18px;font-size:9px;font-weight:700;letter-spacing:.8px;text-transform:uppercase;color:#6B7482;\"><span>Onderneming<\u002Fspan><span>Rechtsvorm<\u002Fspan><span>KvK-nummer<\u002Fspan><span>Vestiging<\u002Fspan><\u002Fdiv>\n    <div style=\"display:grid;grid-template-columns:1.5fr 1fr 1fr 1fr;padding:12px 18px;border-top:1px solid #EEF2F8;font-size:12px;color:#3C4553;align-items:center;\"><span style=\"font-weight:600;color:#141A22;\">Hogenhout Transport Groep B.V.<\u002Fspan><span>B.V.<\u002Fspan><span style=\"color:#9AA3B2;font-style:italic;\">Nog te controleren<\u002Fspan><span style=\"color:#9AA3B2;font-style:italic;\">Niet in bron<\u002Fspan><\u002Fdiv>\n    <div style=\"display:grid;grid-template-columns:1.5fr 1fr 1fr 1fr;padding:12px 18px;border-top:1px solid #EEF2F8;font-size:12px;color:#3C4553;align-items:center;background:#FAFCFF;\"><span style=\"font-weight:600;color:#141A22;\">Hogenhout Holding B.V.<\u002Fspan><span>B.V.<\u002Fspan><span style=\"color:#9AA3B2;font-style:italic;\">Nog te controleren<\u002Fspan><span style=\"color:#9AA3B2;font-style:italic;\">Niet in bron<\u002Fspan><\u002Fdiv>\n  <\u002Fdiv>\n\n  <div style=\"font-size:10.5px;font-weight:600;letter-spacing:1.4px;text-transform:uppercase;color:#0F63FD;border-left:2px solid #0F63FD;padding-left:8px;margin-bottom:12px;\">Privépersonen<\u002Fdiv>\n  <div style=\"border:1px solid #E4E9F1;border-radius:12px;overflow:hidden;margin-bottom:24px;\">\n    <div style=\"display:grid;grid-template-columns:1.4fr 1fr 1fr;background:#F3F6FC;padding:11px 18px;font-size:9px;font-weight:700;letter-spacing:.8px;text-transform:uppercase;color:#6B7482;\"><span>Naam<\u002Fspan><span>Rol<\u002Fspan><span>Belang<\u002Fspan><\u002Fdiv>\n    <div style=\"display:grid;grid-template-columns:1.4fr 1fr 1fr;padding:12px 18px;border-top:1px solid #EEF2F8;font-size:12px;col isplay:flex;align-items:center;gap:10px;padding:9px 12px;background:#F3FAF7;border:1px solid #E0F0E9;border-radius:9px;\"><svg width=\"15\" height=\"15\" viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"#0F7A5A\" stroke-width=\"2.4\"><path d=\"M20 6 9 17l-5-5\"><\u002Fpath><\u002Fsvg><span style=\"flex:1;font-size:12px;color:#3C4553;\">Teksten gevonden<\u002Fspan><span style=\"font-size:12.5px;font-weight:700;color:#0F7A5A;\">9<\u002Fspan><\u002Fdiv>\n      <div style=\"display:flex;align-items:center;gap:10px;padding:9px 12px;background:#F3FAF7;border:1px solid #E0F0E9;border-radius:9px;\"><svg width=\"15\" height=\"15\" viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"#0F7A5A\" stroke-width=\"2.4\"><path d=\"M20 6 9 17l-5-5\"><\u002Fpath><\u002Fsvg><span style=\"flex:1;font-size:12px;color:#3C4553;\">Zekerheden gevonden<\u002Fspan><span style=\"font-size:12.5px;font-weight:700;color:#0F7A5A;\">3<\u002Fspan><\u002Fdiv>\n      <div style=\"display:flex;align-items:center;gap:10px;padding:9px 12px;background:#F3FAF7;border:1px solid #E0F0E9;border-radius:9px;\"><svg width=\"15\" height=\"15\" viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"#0F7A5A\" stroke-width=\"2.4\"><path d=\"M20 6 9 17l-5-5\"><\u002Fpath><\u002Fsvg><span style=\"flex:1;font-size:12px;color:#3C4553;\">Financieringen gevonden<\u002Fspan><span style=\"font-size:12.5px;font-weight:700;color:#0F7A5A;\">2<\u002Fspan><\u002Fdiv>\n    <\u002Fdiv>\n\n    <div style=\"height:1px;background:#EEF2F8;margin:16px 0;\"><\u002Fdiv>\n\n    <div style=\"font-size:9.5px;font-weight:700;letter-spacing:1.2px;text-transform:uppercase;color:#9AA3B2;margin-bottom:11px;\">Signalen<\u002Fdiv>\n    <div style=\"display:flex;flex-direction:column;gap:7px;\">\n      <div style=\"display:flex;align-items:center;gap:10px;padding:9px 12px;background:#FEF9EF;border:1px solid #F6E2BE;border-radius:9px;\"><svg width=\"15\" height=\"15\" viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"#B45309\" stroke-width=\"2.2\"><path d=\"M12 9v4M12 17h.01M10.3 3.9 1.8 18a2 2 0 0 0 1.7 3h17a2 2 0 0 0 1.7-3L13.7 3.9a2 2 0 0 0-3.4 0z\"><\u002Fpath><\u002Fsvg><span style=\"flex:1;font-size:12px;color:#3C4553;\">Mogelijke inconsistenties<\u002Fspan><span style=\"font-size:12.5px;font-weight:700;color:#B45309;\">1<\u002Fspan><\u002Fdiv>\n      <div style=\"display:flex;align-items:center;gap:10px;padding:9px 12px;background:#FCF1EF;border:1px solid #F3D2CE;border-radius:9px;\"><svg width=\"15\" height=\"15\" viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"#B4322A\" stroke-width=\"2.2\"><circle cx=\"12\" cy=\"12\" r=\"9\"><\u002Fcircle><path d=\"M12 8v4M12 16h.01\"><\u002Fpath><\u002Fsvg><span style=\"flex:1;font-size:12px;color:#3C4553;\">Ontbrekende stukken<\u002Fspan><span style=\"font-size:12.5px;font-weight:700;color:#B4322A;\">3<\u002Fspan><\u002Fdiv>\n    <\u002Fdiv>\n\n    <div style=\"height:1px;background:#EEF2F8;margin:16px 0;\"><\u002Fdiv>\n\n    <div style=\"font-size:9.5px;font-weight:700;letter-spacing:1.2px;text-transform:uppercase;color:#9AA3B2;margin-bottom:11px;\">Adviseur-check vereist<\u002Fdiv>\n    <div style=\"display:flex;flex-direction:column;gap:9px;\">\n      <div style=\"display:flex;gap:9px;align-items:flex-start;\"><span style=\"width:6px;height:6px;border-radius:50%;background:#0F63FD;margin-top:5px;flex-shrink:0;\"><\u002Fspan><span style=\"font-size:11.5px;color:#3C4553;line-height:1.45;\">Actuele bankopgave opvragen (restschuld indicatief)<\u002Fspan><\u002Fdiv>\n      <div style=\"display:flex;gap:9px;align-items:flex-start;\"><span style=\"width:6px;height:6px;border-radius:50%;background:#0F63FD;margin-top:5px;flex-shrink:0;\"><\u002Fspan><span style=\"font-size:11.5px;color:#3C4553;line-height:1.45;\">Offertes afvulinstallatie &amp; laadinfrastructuur bijvoegen<\u002Fspan><\u002Fdiv>\n      <div style=\"display:flex;gap:9px;align-items:flex-start;\"><span style=\"width:6px;height:6px;border-radius:50%;background:#0F63FD;margin-top:5px;flex-shrink:0;\"><\u002Fspan><span style=\"font-size:11.5px;color:#3C4553;line-height:1.45;\">KvK-nummers &amp; tekenbevoegdheid bevestigen<\u002Fspan><\u002Fdiv>\n      <div style=\"display:flex;gap:9px;align-items:flex-start;\"><span style=\"width:6px;height:6px;border-radius:50%;background:#0F63FD;margin-top:5px;flex-shrink:0;\"><\u002Fspan><span style=\"font-size:11.5px;color:#3C4553;line-height:1.45;\">Slottermijn &amp; ingangsdatum lease vaststellen<\u002Fspan><\u002Fdiv>\n    <\u002Fdiv>\n\n    <div style=\"margin-top:16px;padding:11px 13px;background:#F6F8FC;border-radius:10px;font-size:10.5px;color:#6B7482;line-height:1.5;\">De agent neemt geen gegevens aan die niet uit de bron blijken. Ontbrekende velden worden gemarkeerd als <em>niet opgenomen in bron<\u002Fem> of <em>nog te controleren<\u002Fem>.<\u002Fdiv>\n  <\u002Fdiv>\n<\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fdiv>\n<\u002Fdiv>\n<\u002Fsc-if>\n\n<\u002Fx-dc>\n<script type=\"text/x-dc\" data-dc-script=\"\" data-props=\"{&quot;$preview&quot;:{&quot;width&quot;:&quot;100%&quot;,&quot;height&quot;:&quot;100%&quot;}}\">\nclass Component extends DCLogic {\n  state = { view: 'upload', file: null, dragging: false, loadStep: -1, checksOpen: true };\n\n  onPick(e){ const f=e.target.files && e.target.files[0]; if(f) this.setState({file:{name:f.name,size:f.size}}); }\n  onDragOver(e){ e.preventDefault(); if(!this.state.dragging) this.setState({dragging:true}); }\n  onDragLeave(e){ e.preventDefault(); this.setState({dragging:false}); }\n  onDropFile(e){ e.preventDefault(); const f=e.dataTransfer.files && e.dataTransfer.files[0]; this.setState({dragging:false, file: f?{name:f.name,size:f.size}:this.state.file}); }\n\n  onGenerate(){\n    (this._timers||[]).forEach(clearTimeout);\n    this._timers=[];\n    this.setState({view:'loading', loadStep:0});\n    const total=6;\n    for(let i=1;i<=total;i++){ this._timers.push(setTimeout(()=>this.setState({loadStep:i}), i*820)); }\n    this._timers.push(setTimeout(()=>{ this.setState({view:'report'}); window.scrollTo(0,0); }, total*820+650));\n  }\n  onReset(){ (this._timers||[]).forEach(clearTimeout); this.setState({view:'upload', file:null, loadStep:-1}); window.scrollTo(0,0); }\n  onPrint(){ window.print(); }\n  onToggleChecks(){ this.setState(s=>({checksOpen:!s.checksOpen})); }\n  componentWillUnmount(){ (this._timers||[]).forEach(clearTimeout); }\n\n  fmtSize(b){ if(!b) return 'PDF'; return (b/1024/1024).toFixed(2)+' MB'; }\n\n  renderVals(){\n    const v=this.state.view;\n    const hasFile=!!this.state.file;\n    const drag=this.state.dragging;\n    const steps=[\n      'Memorandum wordt geanalyseerd',\n      'Juridische structuur wordt opgehaald',\n      'Financieringsbehoefte wordt gecontroleerd',\n      'Zekerheden en bestaande financieringen worden verwerkt',\n      'Teksten worden herschreven in Credion MB-stijl',\n      'Rapport wordt opgemaakt',\n    ];\n    const ls=this.state.loadStep;\n    const loadingSteps=steps.map((label,i)=>{\n      const st = i<ls ? 'done' : (i===ls ? 'active' : 'todo');\n      const color = st==='done' ? '#0F7A5A' : (st==='active' ? '#0F63FD' : '#9AA3B2');\n      const bg = st==='active' ? '#EEF3FF' : (st==='done' ? '#F3FAF7' : 'transparent');\n      return {\n        label,\n        rowStyle:`display:flex;align-items:center;gap:11px;font-size:12.5px;font-weight:${st==='active'?'600':'400'};color:${color};background:${bg};padding:8px 13px;border-radius:9px;transition:all .3s;`,\n        dotStyle:`width:7px;height:7px;border-radius:50%;background:${color};flex-shrink:0;${st==='active'?'animation:pulseDot 1s ease infinite;':''}`,\n        tickStyle:`font-size:13px;color:#0F7A5A;font-weight:700;${st==='done'?'':'opacity:0;'}`,\n      };\n    });\n    const pct = ls<0 ? 0 : Math.min(100, Math.round(((ls+0.5)/6)*100));\n\n    return {\n      isForm: v==='upload'||v==='loading',\n      isUpload: v==='upload',\n      isLoading: v==='loading',\n      isReport: v==='report',\n      hasFile,\n      noFile: !hasFile,\n      fileName: this.state.file ? this.state.file.name : '',\n      fileSize: this.fmtSize(this.state.file && this.state.file.size),\n      dropBorder: hasFile ? '#0F7A5A' : (drag ? '#0F63FD' : '#C6D2E4'),\n      dropBg: hasFile ? '#F3FAF7' : (drag ? '#EEF3FF' : '#F8FAFD'),\n      loadingSteps,\n      loadPct: pct+'%',\n      checksPanelStyle: this.state.checksOpen ? '' : 'display:none;',\n      onPick: this.onPick.bind(this),\n      onDragOver: this.onDragOver.bind(this),\n      onDragLeave: this.onDragLeave.bind(this),\n      onDropFile: this.onDropFile.bind(this),\n      onGenerate: this.onGenerate.bind(this),\n      onReset: this.onReset.bind(this),\n      onPrint: this.onPrint.bind(this),\n      onToggleChecks: this.onToggleChecks.bind(this),\n    };\n  }\n}\n<\u002Fscript>\n\n\n<\u002Fbody><\u002Fhtml>"
